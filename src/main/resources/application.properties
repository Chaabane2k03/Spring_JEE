
spring.application.name=classroom_crb

server.port=${SERVER_PORT:8089}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/classroom}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/classroom_crb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
# spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/api-docs/swagger-ui.html

security.rate-limit.enabled=true
security.rate-limit.max-requests=60
security.rate-limit.window-seconds=60

app.retry.max-attempts=3
app.retry.delay-ms=200
app.retry.multiplier=2.0
app.retry.max-delay-ms=2000
