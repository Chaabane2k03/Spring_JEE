spring.datasource.url=jdbc:h2:file:./target/h2/classroom_test;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

security.rate-limit.enabled=false
security.rate-limit.max-requests=60
security.rate-limit.window-seconds=60

app.retry.max-attempts=3
app.retry.delay-ms=50
app.retry.multiplier=2.0
app.retry.max-delay-ms=500
