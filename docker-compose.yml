services:
  mysql:
    image: mysql:8.4
    container_name: classroom-mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: classroom_crb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -padmin"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: classroom-crb:latest
    container_name: classroom-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8089
      SERVER_CONTEXT_PATH: /classroom
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/classroom_crb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    ports:
      - "8089:8089"
    restart: unless-stopped

volumes:
  mysql_data:
